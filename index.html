<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Wallet | Efikcoin Eternal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary-gold: #FFD700;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100-vh;
        }

        .wallet-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: center;
        }

        .header h1 {
            color: var(--primary-gold);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 4px solid var(--primary-gold);
        }

        .balance-amount {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send { background-color: var(--primary-gold); color: black; }
        .btn-receive { background-color: #333; color: white; border: 1px solid var(--primary-gold); }

        #login-section { margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wallet-container">
    <div class="header">
        <h1>Efikcoin Eternal</h1>
        <p>Official $ECE Wallet</p>
    </div>

    <div id="wallet-main" class="hidden">
        <div class="balance-card">
            <span style="color: #aaa; font-size: 0.9rem;">Available Balance</span>
            <span class="balance-amount">0.00 ECE</span>
            <small style="color: var(--primary-gold);">≈ 0.00 NGN</small>
        </div>

        <button class="btn btn-send" onclick="alert('Send feature coming soon!')">SEND</button>
        <button class="btn btn-receive" onclick="alert('Your Address: 0x...')">RECEIVE</button>
        
        <p style="font-size: 0.7rem; color: #666; margin-top: 20px;">Connected as: <span id="user-email"></span></p>
    </div>

    <div id="login-section">
        <p>Secure access to your assets</p>
        <div id="g_id_onload"
             data-client_id="ecewallet-4111a.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="redirect"
             data-login_uri="https://efikcoin-eternal-blockchain.github.io/ECE-Wallet/"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
    </div>

    <footer style="margin-top: 30px; font-size: 0.8rem; color: #555;">
        &copy; 2026 Efikcoin Eternal Foundation
    </footer>
</div>

<script>
    // Logic to show wallet after login (This is a simulation for UI)
    window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        // In a real app, you verify the JWT token from Google here
        if (window.location.hash || urlParams.get('credential')) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('wallet-main').classList.remove('hidden');
            document.getElementById('user-email').innerText = "Verified User";
        }
    };
</script>

</body>
</html>
